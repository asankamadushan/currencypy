name: CI

# Run on pull requests only (not on push), so direct pushes to the default branch
# do not trigger this workflow.
on:
  pull_request:

# Drop redundant runs when a PR branch is pushed again (saves billed minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # Pinned SHAs = immutable releases (see tags on each repo). Update together when bumping.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          # Key only invalidates when project deps change (not unrelated repo files).
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: |
          uv run --frozen ruff check src tests
          uv run --frozen ruff format --check src tests

      - name: Tests
        run: uv run --frozen pytest
