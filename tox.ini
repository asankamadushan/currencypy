[tox]
minversion = 3.7.0
envlist = mypy, pylint, python3.7, python3.8, python3.9, python3.10
isolated_build = true

[gh-actions]
python =
    3.9: python3.9
    3.10: python3.10

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pytest --basetemp={envtmpdir}


[testenv:mypy]
basepython = python3.9
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    mypy --install-types
    mypy src

[testenv:pylint]
basepython = python3.9
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pylint src/