[tox]
minversion = 3.8.0
envlist = mypy, python3.7, python3.8, python3.9, python3.10
isolated_build = true

[gh-actions]
python =
    3.9: py39

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pytest --basetemp={envtmpdir}


[testenv:mypy]
basepython = python3.9
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    mypy --install-types
    mypy src